<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Zophiel Register Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8c25f4",
                        "primary-dark": "#721ec7",
                        "background-light": "#f7f5f8",
                        "background-dark": "#191022",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                    backgroundImage: {
                        'gradient-primary': 'linear-gradient(135deg, #8c25f4 0%, #a255f4 100%)',
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased min-h-screen flex flex-col items-center justify-center p-4">
<!-- Main Container -->
<div class="w-full max-w-[480px] flex flex-col items-center gap-6">
<!-- Top Section: Logo & Branding -->
<div class="flex flex-col items-center gap-3 pt-6">
<!-- Logo Placeholder -->
<div class="w-20 h-20 rounded-2xl bg-primary/10 flex items-center justify-center backdrop-blur-sm border border-primary/20 shadow-[0_0_15px_rgba(140,37,244,0.15)]">
<span class="material-symbols-outlined text-4xl text-primary">stethoscope</span>
</div>
<p class="text-slate-900 dark:text-white text-xl font-semibold tracking-wide">Zophiel</p>
</div>
<!-- Heading Section -->
<div class="w-full text-center px-4 space-y-2">
<h1 class="text-slate-900 dark:text-white tracking-tight text-[32px] font-bold leading-tight">
                Creá tu cuenta
            </h1>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal leading-normal">
                Empezá a registrar y entender tu dolor
            </p>
</div>
<!-- Form Card -->
<form class="w-full flex flex-col gap-4 mt-2">
<!-- Input: Name -->
<div class="flex flex-col gap-1">
<div class="relative flex items-center w-full">
<input class="form-input peer w-full bg-white dark:bg-[#251b30] border border-slate-200 dark:border-[#473b54] text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-[#ab9cba] h-14 pl-4 pr-12 rounded-xl focus:outline-0 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200" placeholder="Nombre completo" type="text"/>
<span class="absolute right-4 text-slate-400 dark:text-[#ab9cba] pointer-events-none peer-focus:text-primary transition-colors">
<span class="material-symbols-outlined">person</span>
</span>
</div>
</div>
<!-- Input: Email -->
<div class="flex flex-col gap-1">
<div class="relative flex items-center w-full">
<input class="form-input peer w-full bg-white dark:bg-[#251b30] border border-slate-200 dark:border-[#473b54] text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-[#ab9cba] h-14 pl-4 pr-12 rounded-xl focus:outline-0 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200" placeholder="Correo electrónico" type="email"/>
<span class="absolute right-4 text-slate-400 dark:text-[#ab9cba] pointer-events-none peer-focus:text-primary transition-colors">
<span class="material-symbols-outlined">mail</span>
</span>
</div>
</div>
<!-- Input: Password -->
<div class="flex flex-col gap-1">
<div class="relative flex items-center w-full">
<input class="form-input peer w-full bg-white dark:bg-[#251b30] border border-slate-200 dark:border-[#473b54] text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-[#ab9cba] h-14 pl-4 pr-12 rounded-xl focus:outline-0 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200" placeholder="Contraseña" type="password"/>
<span class="absolute right-4 text-slate-400 dark:text-[#ab9cba] pointer-events-none peer-focus:text-primary transition-colors">
<span class="material-symbols-outlined">lock</span>
</span>
</div>
</div>
<!-- Input: Confirm Password -->
<div class="flex flex-col gap-1">
<div class="relative flex items-center w-full">
<input class="form-input peer w-full bg-white dark:bg-[#251b30] border border-slate-200 dark:border-[#473b54] text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-[#ab9cba] h-14 pl-4 pr-12 rounded-xl focus:outline-0 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200" placeholder="Confirmar contraseña" type="password"/>
<span class="absolute right-4 text-slate-400 dark:text-[#ab9cba] pointer-events-none peer-focus:text-primary transition-colors">
<span class="material-symbols-outlined">lock_reset</span>
</span>
</div>
</div>
<!-- Submit Button -->
<button class="mt-4 w-full h-14 rounded-xl bg-gradient-primary text-white font-semibold text-base shadow-lg shadow-primary/30 hover:shadow-primary/50 active:scale-[0.98] transition-all duration-200 flex items-center justify-center" type="button">
                Crear cuenta
            </button>
</form>
<!-- Social Divider -->
<div class="w-full flex items-center gap-4 px-2">
<div class="h-px bg-slate-200 dark:bg-white/10 flex-1"></div>
<p class="text-slate-500 dark:text-slate-400 text-sm">o registrarse con</p>
<div class="h-px bg-slate-200 dark:bg-white/10 flex-1"></div>
</div>
<!-- Google Button -->
<button class="w-full h-14 rounded-xl border border-slate-200 dark:border-[#473b54] bg-white dark:bg-transparent hover:bg-slate-50 dark:hover:bg-white/5 active:bg-slate-100 dark:active:bg-white/10 transition-colors flex items-center justify-center gap-3 group">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M21.8055 10.0415H21V10H12V14H17.6515C16.827 16.3285 14.6115 18 12 18C8.6865 18 6 15.3135 6 12C6 8.6865 8.6865 6 12 6C13.5295 6 14.921 6.577 15.9805 7.5195L18.809 4.691C17.023 3.0265 14.634 2 12 2C6.4775 2 2 6.4775 2 12C2 17.5225 6.4775 22 12 22C17.5225 22 22 17.5225 22 12C22 11.3295 21.931 10.675 21.8055 10.0415Z" fill="#FFC107"></path>
<path d="M3.15295 7.3455L6.4385 9.755C7.3275 7.554 9.4805 6 12 6C13.5295 6 14.921 6.577 15.9805 7.5195L18.809 4.691C17.023 3.0265 14.634 2 12 2C8.1585 2 4.8285 4.1685 3.15295 7.3455Z" fill="#FF3D00"></path>
<path d="M12 22C14.6605 22 17.0185 20.9455 18.7475 19.2445L15.602 16.67C14.5615 17.5105 13.308 18 12 18C9.3995 18 7.1905 16.3415 6.3585 14.027L3.0975 16.5395C4.7525 19.778 8.1135 22 12 22Z" fill="#4CAF50"></path>
<path d="M21.8055 10.0415H21V10H12V14H17.6515C17.257 15.108 16.546 16.076 15.6015 16.67L18.747 19.2445C18.4285 19.5595 22 16.92 22 12C22 11.3295 21.931 10.675 21.8055 10.0415Z" fill="#1976D2"></path>
</svg>
<span class="text-slate-700 dark:text-white font-medium">Continuar con Google</span>
</button>
<!-- Footer -->
<div class="pb-6">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                ¿Ya tenés cuenta? 
                <a class="text-primary hover:text-primary-dark font-medium ml-1 transition-colors" href="#">Iniciar sesión</a>
</p>
</div>
</div>
</body></html>
