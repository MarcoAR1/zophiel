<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Zophiel Login</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8c25f4",
                        "background-light": "#f7f5f8",
                        "background-dark": "#191022",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col items-center justify-center p-4">
<!-- Main Container -->
<div class="w-full max-w-md mx-auto flex flex-col h-full justify-center">
<!-- Header Section -->
<div class="flex flex-col items-center mb-8">
<div class="w-16 h-16 bg-primary/20 rounded-full flex items-center justify-center mb-4 text-primary">
<span class="material-symbols-outlined !text-4xl">stethoscope</span>
</div>
<h1 class="text-3xl font-bold text-slate-900 dark:text-white mb-1">Zophiel</h1>
</div>
<!-- Glassmorphism Card -->
<div class="w-full bg-white/50 dark:bg-[#251b2e]/80 backdrop-blur-xl border border-slate-200 dark:border-white/10 p-6 sm:p-8 rounded-[2rem] shadow-xl">
<div class="text-center mb-8">
<h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">Bienvenido de vuelta</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">Ingresá para continuar registrando tu dolor</p>
</div>
<!-- Login Form -->
<form class="space-y-5">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
<span class="material-symbols-outlined">mail</span>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-[#1f1627] border border-slate-200 dark:border-[#473b54] rounded-xl text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" placeholder="ejemplo@correo.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">Contraseña</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-[#1f1627] border border-slate-200 dark:border-[#473b54] rounded-xl text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" placeholder="********" type="password"/>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end">
<a class="text-sm font-medium text-primary hover:text-primary/80 transition-colors" href="#">
                        ¿Olvidaste tu contraseña?
                    </a>
</div>
<!-- Submit Button -->
<button class="w-full py-4 px-6 bg-gradient-to-r from-primary to-[#6e1bc4] hover:from-[#7a1fd6] hover:to-[#5c16a6] text-white font-bold rounded-xl shadow-lg shadow-primary/30 transition-all transform active:scale-[0.98]" type="button">
                    Iniciar sesión
                </button>
</form>
<!-- Divider -->
<div class="relative flex py-8 items-center">
<div class="flex-grow border-t border-slate-200 dark:border-white/10"></div>
<span class="flex-shrink-0 mx-4 text-slate-400 text-sm font-medium">o continuar con</span>
<div class="flex-grow border-t border-slate-200 dark:border-white/10"></div>
</div>
<!-- Social Login -->
<button class="w-full flex items-center justify-center gap-3 py-3.5 px-6 border border-slate-200 dark:border-white/20 rounded-xl bg-transparent hover:bg-slate-50 dark:hover:bg-white/5 transition-colors group" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-slate-700 dark:text-white font-medium group-hover:text-slate-900 dark:group-hover:text-white transition-colors">Google</span>
</button>
</div>
<!-- Footer -->
<div class="mt-8 text-center">
<p class="text-slate-500 dark:text-slate-400">
                ¿No tenés cuenta? 
                <a class="text-primary font-bold hover:underline ml-1" href="#">Registrate</a>
</p>
</div>
</div>
</body></html>
