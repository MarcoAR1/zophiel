name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup debug keystore
        run: |
          mkdir -p ~/.android
          # ALWAYS generate fresh to avoid Git binary corruption
          echo "Generating fresh debug keystore..."
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  DEBUG KEYSTORE SHA-1 — ADD THIS TO GOOGLE CLOUD CONSOLE   ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          keytool -list -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -storepass android -keypass android \
            | grep -E "SHA1|SHA-1|SHA256|SHA-256"
          echo "╚══════════════════════════════════════════════════════════════╝"


      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @zophiel/shared build

      - name: Build web assets
        working-directory: apps/client
        run: pnpm build
        env:
          VITE_API_URL: https://zophielserver-production.up.railway.app/api
          VITE_GOOGLE_CLIENT_ID: 399934829057-ion4sr02mpnftbd3kssju2e63jg4c4s4.apps.googleusercontent.com

      - name: Add Android platform
        working-directory: apps/client
        run: npx cap add android

      - name: Set minSdkVersion to 26 (Health Connect requires API 26+)
        run: |
          VARS_FILE=apps/client/android/variables.gradle
          if [ -f "$VARS_FILE" ]; then
            sed -i 's/minSdkVersion = .*/minSdkVersion = 26/' "$VARS_FILE"
            echo "Updated variables.gradle:"
            cat "$VARS_FILE"
          fi

      - name: Sync Capacitor
        working-directory: apps/client
        run: npx cap sync android

      - name: Patch MainActivity for SocialLogin (MUST be after cap sync)
        run: |
          MAIN_ACT=apps/client/android/app/src/main/java/com/zophiel/app/MainActivity.java
          cat > "$MAIN_ACT" << 'JAVAEOF'
          package com.zophiel.app;

          import android.content.Intent;
          import android.os.Bundle;
          import com.getcapacitor.BridgeActivity;
          import ee.forgr.capacitor.social.login.ModifiedMainActivityForSocialLoginPlugin;
          import ee.forgr.capacitor.social.login.SocialLoginPlugin;
          import ee.forgr.capacitor.social.login.GoogleProvider;

          public class MainActivity extends BridgeActivity implements ModifiedMainActivityForSocialLoginPlugin {
              @Override
              public void IHaveModifiedTheMainActivityForTheUseWithSocialLoginPlugin() {
                  // Required marker method — confirms this activity is patched for SocialLogin
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (requestCode >= GoogleProvider.REQUEST_AUTHORIZE_GOOGLE_MIN
                      && requestCode <= GoogleProvider.REQUEST_AUTHORIZE_GOOGLE_MAX) {
                      SocialLoginPlugin plugin = (SocialLoginPlugin) this.bridge.getPlugin("SocialLogin").getInstance();
                      if (plugin != null) {
                          plugin.handleGoogleLoginIntent(requestCode, data);
                      }
                  }
              }
          }
          JAVAEOF
          # Fix indentation (heredoc preserves leading spaces)
          sed -i 's/^          //' "$MAIN_ACT"
          echo "=== Patched MainActivity.java ==="
          cat "$MAIN_ACT"

      - name: Copy app icon and splash to Android resources
        run: |
          ICON_SRC=apps/client/resources/icon.png
          SPLASH_SRC=apps/client/resources/splash.png
          ANDROID_RES=apps/client/android/app/src/main/res

          # Copy icon to all mipmap densities
          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            cp "$ICON_SRC" "$ANDROID_RES/$dir/ic_launcher.png"
            cp "$ICON_SRC" "$ANDROID_RES/$dir/ic_launcher_round.png"
            cp "$ICON_SRC" "$ANDROID_RES/$dir/ic_launcher_foreground.png" 2>/dev/null || true
          done

          # Copy splash screen to drawable
          for dir in drawable drawable-land drawable-mdpi drawable-hdpi drawable-xhdpi drawable-xxhdpi drawable-xxxhdpi; do
            mkdir -p "$ANDROID_RES/$dir"
            cp "$SPLASH_SRC" "$ANDROID_RES/$dir/splash.png"
          done

      - name: Build debug APK
        working-directory: apps/client/android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Verify APK signing SHA-1
        run: |
          APK=apps/client/android/app/build/outputs/apk/debug/app-debug.apk
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  APK SIGNING CERTIFICATE — MUST MATCH GOOGLE CLOUD CONSOLE ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          keytool -printcert -jarfile "$APK" | grep -E "SHA1|SHA-1|SHA256|SHA-256"
          echo "╚══════════════════════════════════════════════════════════════╝"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zophiel-apk
          path: apps/client/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: Zophiel APK (Latest)
          body: |
            📱 Latest Zophiel APK build
            Built from commit ${{ github.sha }}
          files: apps/client/android/app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to server
        run: |
          APK_FILE=apps/client/android/app/build/outputs/apk/debug/app-debug.apk
          echo "Uploading $(du -h "$APK_FILE" | cut -f1) APK to server..."
          curl -X POST \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$APK_FILE" \
            --max-time 120 \
            https://zophielserver-production.up.railway.app/api/download/apk
          echo ""
          echo "APK uploaded successfully"
