name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @zophiel/shared build

      - name: Build web assets
        run: pnpm --filter @zophiel/client build

      - name: Add Android platform
        working-directory: apps/client
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: apps/client
        run: npx cap sync android

      - name: Copy app icon to Android resources
        run: |
          ICON_SRC=apps/client/resources/icon.png
          ANDROID_RES=apps/client/android/app/src/main/res
          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            cp "$ICON_SRC" "$ANDROID_RES/$dir/ic_launcher.png"
            cp "$ICON_SRC" "$ANDROID_RES/$dir/ic_launcher_round.png"
            cp "$ICON_SRC" "$ANDROID_RES/$dir/ic_launcher_foreground.png" 2>/dev/null || true
          done

      - name: Build debug APK
        working-directory: apps/client/android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Print debug SHA-1 (for Google Cloud Console)
        run: keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android 2>/dev/null | grep SHA1 || echo "Debug keystore not found"

      - name: Copy APK to public
        run: |
          mkdir -p apps/client/public/downloads
          cp apps/client/android/app/build/outputs/apk/debug/app-debug.apk apps/client/public/downloads/zophiel.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zophiel-apk
          path: apps/client/public/downloads/zophiel.apk
          retention-days: 30

      - name: Commit APK to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/client/public/downloads/zophiel.apk
          git diff --staged --quiet || git commit -m "ci: update APK build [skip ci]"
          git push
