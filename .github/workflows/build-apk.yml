name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/client/**'
      - 'packages/shared/**'
      - 'Dockerfile.apk'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build APK via Docker
        run: |
          docker build \
            -f Dockerfile.apk \
            --target output \
            --output type=local,dest=./output \
            .

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: zophiel-apk
          path: ./output/zophiel.apk
          retention-days: 30

      - name: Copy APK to public folder
        run: |
          mkdir -p apps/client/public/downloads
          cp ./output/zophiel.apk apps/client/public/downloads/zophiel.apk

      - name: Commit APK to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/client/public/downloads/zophiel.apk
          git diff --staged --quiet || git commit -m "ci: update APK build [skip ci]"
          git push
