<!DOCTYPE html>

<html class="dark" lang="es"><head>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8c25f4",
                        "background-light": "#f7f5f8",
                        "background-dark": "#191022",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-slate-100 min-h-screen flex flex-col justify-between overflow-x-hidden selection:bg-primary selection:text-white">
<!-- Main Content Container -->
<div class="flex-1 flex flex-col w-full max-w-md mx-auto relative px-6 py-8">
<!-- Header Section -->
<header class="flex flex-col items-center justify-center pt-8 pb-6 space-y-4">
<!-- Logo Icon -->
<div class="relative flex items-center justify-center size-20 rounded-2xl bg-gradient-to-br from-primary/20 to-primary/5 shadow-inner shadow-primary/20 ring-1 ring-white/10 backdrop-blur-sm">
<span class="material-symbols-outlined text-primary text-[40px]" data-icon="cardiology">cardiology</span>
<div class="absolute -bottom-1 -right-1 bg-primary text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border border-[#191022]">Z</div>
</div>
<!-- App Name -->
<h1 class="text-3xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white via-slate-200 to-slate-400">
                Zophiel
            </h1>
<!-- Tagline -->
<p class="text-slate-400 text-center text-sm font-medium max-w-[280px] leading-relaxed">
                Tu compañero en el manejo del dolor crónico
            </p>
</header>
<!-- Tabs -->
<div class="mt-4 mb-8">
<div class="flex border-b border-white/10 w-full">
<button class="flex-1 pb-3 text-center text-sm font-semibold text-primary border-b-2 border-primary transition-colors duration-200" type="button">
                    Iniciar Sesión
                </button>
<button class="flex-1 pb-3 text-center text-sm font-semibold text-slate-500 hover:text-slate-300 border-b-2 border-transparent hover:border-slate-700 transition-colors duration-200" type="button">
                    Registrarse
                </button>
</div>
</div>
<!-- Form Section -->
<form class="space-y-5 w-full">
<!-- Email Input -->
<div class="space-y-1.5">
<label class="text-xs font-semibold text-slate-400 ml-1" for="email">Correo electrónico</label>
<div class="relative group">
<input class="w-full h-14 pl-4 pr-12 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-300" id="email" placeholder="nombre@ejemplo.com" type="email"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1.5">
<div class="flex justify-between items-center ml-1">
<label class="text-xs font-semibold text-slate-400" for="password">Contraseña</label>
<a class="text-xs font-medium text-primary hover:text-primary/80 transition-colors" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative group">
<input class="w-full h-14 pl-4 pr-12 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-300" id="password" placeholder="••••••••" type="password"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary cursor-pointer hover:text-slate-300 transition-colors">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</div>
</div>
</div>
<!-- Main Action Button -->
<button class="w-full h-14 mt-4 bg-gradient-to-r from-primary to-[#6d1cc5] text-white font-bold rounded-xl shadow-lg shadow-primary/25 hover:shadow-primary/40 hover:scale-[1.01] active:scale-[0.99] transition-all duration-200 flex items-center justify-center gap-2">
<span>Iniciar Sesión</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative flex py-8 items-center">
<div class="flex-grow border-t border-white/10"></div>
<span class="flex-shrink-0 mx-4 text-slate-500 text-xs font-medium">o</span>
<div class="flex-grow border-t border-white/10"></div>
</div>
<!-- Social Login -->
<button class="w-full h-14 bg-white text-slate-900 font-semibold rounded-xl flex items-center justify-center gap-3 hover:bg-slate-100 transition-colors duration-200">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
            Continuar con Google
        </button>
</div>
<!-- Footer -->
<div class="w-full py-6 text-center border-t border-white/5 bg-[#140d1c]">
<p class="text-sm text-slate-400">
            ¿No tenés cuenta? 
            <a class="text-primary font-bold hover:underline" href="#">Registrate</a>
</p>
</div>
</body></html>
